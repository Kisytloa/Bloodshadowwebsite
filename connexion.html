<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Crimson Reign</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      position: relative;
    }

    /* Lueur derrière le formulaire */
    .login-wrapper::before {
      content: '';
      position: absolute;
      inset: -40px;
      background: radial-gradient(ellipse 80% 60% at 50% 50%,
        rgba(179,0,27,0.18) 0%, transparent 70%);
      pointer-events: none;
      z-index: -1;
    }

    .login-container {
      background: linear-gradient(160deg, rgba(22,10,30,0.98), rgba(14,5,20,0.98));
      border: 1px solid rgba(179,0,27,0.45);
      border-radius: 18px;
      padding: 44px 38px 38px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      box-shadow:
        0 25px 60px rgba(0,0,0,0.85),
        0 0 40px rgba(179,0,27,0.12),
        inset 0 1px 0 rgba(255,255,255,0.05);
      animation: loginAppear 0.55s cubic-bezier(0.25,0.46,0.45,0.94) both;
    }

    @keyframes loginAppear {
      from { opacity: 0; transform: translateY(28px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1); }
    }

    /* Barre dorée top */
    .login-container::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold), var(--red), var(--gold), transparent);
    }

    /* Coin déco bas-droite */
    .login-container::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 80px; height: 80px;
      background: linear-gradient(315deg, rgba(179,0,27,0.12), transparent 60%);
      pointer-events: none;
    }

    .login-logo {
      width: 90px;
      height: 90px;
      object-fit: contain;
      border-radius: 50%;
      background: radial-gradient(circle, #200830, #08000e);
      border: 2px solid rgba(201,146,42,0.5);
      box-shadow:
        0 0 22px rgba(201,146,42,0.35),
        0 0 44px rgba(179,0,27,0.25);
      margin-bottom: 22px;
      animation: logoPulse 4s ease-in-out infinite alternate;
    }

    @keyframes logoPulse {
      from { box-shadow: 0 0 16px rgba(201,146,42,0.3),  0 0 32px rgba(179,0,27,0.2); }
      to   { box-shadow: 0 0 28px rgba(201,146,42,0.55), 0 0 55px rgba(179,0,27,0.35); }
    }

    .login-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: transparent;
      background: linear-gradient(130deg, #c9922a, #f0c040, #d4001f);
      -webkit-background-clip: text;
      background-clip: text;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .login-subtitle {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 28px;
    }

    /* Séparateur */
    .login-divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(179,0,27,0.35), transparent);
      margin-bottom: 24px;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .login-form label {
      font-family: 'Cinzel', serif;
      font-size: 0.72rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .login-form label span { font-size: 0.85rem; }

    .login-form input {
      background: rgba(8,2,14,0.85);
      border: 1px solid rgba(179,0,27,0.3);
      border-radius: 10px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 1rem;
      width: 100%;
      margin-bottom: 18px;
      outline: none;
      transition: border-color 0.22s, box-shadow 0.22s;
    }

    .login-form input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,146,42,0.14), 0 0 12px rgba(201,146,42,0.1);
    }

    .login-form input::placeholder { color: var(--text-dim); font-style: italic; }

    .login-btn {
      width: 100%;
      padding: 14px;
      margin-top: 6px;
      font-family: 'Cinzel', serif !important;
      font-size: 0.88rem !important;
      letter-spacing: 2px !important;
      text-transform: uppercase !important;
      background: linear-gradient(135deg, var(--red), #7a0010) !important;
      border: 1px solid rgba(179,0,27,0.6) !important;
      border-radius: 10px !important;
      color: #fff !important;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: all 0.25s !important;
      box-shadow: 0 4px 18px rgba(179,0,27,0.35) !important;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.5s;
    }

    .login-btn:hover::before { left: 100%; }

    .login-btn:hover {
      background: linear-gradient(135deg, var(--red-bright), var(--red)) !important;
      box-shadow: 0 6px 24px rgba(179,0,27,0.5) !important;
      transform: translateY(-2px) !important;
    }

    #login-message {
      margin-top: 16px;
      font-family: 'Cinzel', serif;
      font-size: 0.8rem;
      letter-spacing: 1px;
      text-align: center;
      min-height: 24px;
      padding: 8px 12px;
      border-radius: 8px;
      transition: all 0.3s;
    }

    #login-message.success {
      color: #81c784;
      background: rgba(46,125,50,0.15);
      border: 1px solid rgba(46,125,50,0.3);
    }

    #login-message.error {
      color: #ef9a9a;
      background: rgba(179,0,27,0.12);
      border: 1px solid rgba(179,0,27,0.3);
    }

    /* Particules d'ambiance */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: -1;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { opacity: 0;    transform: translateY(100vh) scale(0); }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.3; }
      100% { opacity: 0;    transform: translateY(-20px) scale(1.5); }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.17.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/9.17.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBfJubhqQFQNo8fxVLKh1DKlfisJhZYwGI",
      authDomain: "bloodshadowsite-d35ce.firebaseapp.com",
      projectId: "bloodshadowsite-d35ce",
      storageBucket: "bloodshadowsite-d35ce.firebasestorage.app",
      messagingSenderId: "368188025874",
      appId: "1:368188025874:web:cfdd31f87651f1a3737ccb",
      measurementId: "G-1PJ7HXSP6J"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getFirestore(app);
    const msg  = document.getElementById('login-message');

    function showMsg(text, type) {
      msg.textContent = text;
      msg.className = type;
    }

    // Connexion
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email    = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.querySelector('.login-btn');

      btn.textContent = '…';
      btn.style.opacity = '0.7';
      showMsg('', '');

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        const q    = query(collection(db, 'joueurs'), where('uid', '==', cred.user.uid));
        const snap = await getDocs(q);

        if (!snap.empty) {
          const membre = snap.docs[0].data();
          localStorage.setItem('userUid',  cred.user.uid);
          localStorage.setItem('userRole', membre.role || 'Membre de Guilde');
          showMsg('✦ Connexion réussie — bienvenue ' + (membre.nom || '') + ' !', 'success');
          setTimeout(() => window.location.href = 'index.html', 1000);
        } else {
          showMsg('Aucun membre associé à ce compte.', 'error');
          btn.textContent = 'Se connecter';
          btn.style.opacity = '1';
        }
      } catch {
        showMsg('Identifiants incorrects.', 'error');
        btn.textContent = 'Se connecter';
        btn.style.opacity = '1';
      }
    });

    // Redirection si déjà connecté
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = 'index.html';
    });
  </script>
</head>
<body>

  <!-- Particules -->
  <div class="particles" id="particles"></div>

  <div class="login-wrapper">
    <div class="login-container">
      <img src="Logo guilde.jpg" alt="Logo Bloodshadow" class="login-logo" />
      <div class="login-title">Bloodshadow</div>
      <div class="login-subtitle">Guilde Lost Ark</div>
      <div class="login-divider"></div>

      <form id="login-form" class="login-form">
        <label for="username"><span>✉</span> Email</label>
        <input type="text" id="username" name="username" placeholder="ton@email.com" required autocomplete="username" />

        <label for="password"><span>🔒</span> Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password" />

        <button type="submit" class="login-btn">⚔ Se connecter</button>
      </form>

      <div id="login-message"></div>
    </div>
  </div>

  <script>
    // Génère des particules flottantes
    const container = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay    = (Math.random() * 10) + 's';
      p.style.width  = (1 + Math.random() * 2) + 'px';
      p.style.height = p.style.width;
      p.style.background = Math.random() > 0.5 ? 'var(--gold)' : 'var(--red)';
      container.appendChild(p);
    }
  </script>
</body>
</html>
